<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业实习报告系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .login-title {
            text-align: center;
            color: #1890ff;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 35px;
            line-height: 1.4;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 15px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 3px rgba(24,144,255,0.1);
        }
        .form-group input::placeholder {
            color: #bfbfbf;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: #40a9ff;
        }
        .login-btn:active {
            background: #096dd9;
        }
        .error-message {
            color: #ff4d4f;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            display: none;
        }
        .info-box {
            margin-top: 24px;
            padding: 16px;
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            border-radius: 6px;
            color: #096dd9;
            font-size: 14px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="login-title">专业实习报告系统</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="studentId">用户名</label>
                <input type="text" id="studentId" name="studentId" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="login-btn">登录</button>
            <div class="error-message" id="errorMsg"></div>
        </form>
        <div class="info-box">
            学生默认账户为学号，默认密码为学号。<br>
            首次登录系统强制修改，忘记密码联系老师进行重置。
        </div>
    </div>

    <script>
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const studentId = document.getElementById('studentId').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ studentId, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    window.location.href = '/home.html';
                } else {
                    errorMsg.textContent = result.error || '登录失败';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请重试';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
